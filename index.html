<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Song Writer Pro</title>

<link rel="shortcut icon" href="song.png" type="image/x-icon">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{box-sizing:border-box}

button{
  -webkit-tap-highlight-color: transparent;
}

body{margin:0;font-family:Arial,sans-serif;background:#111;color:white;}

/* APP CONTENT CONTAINER */
.container{
  width:90%;
  margin:30px auto;
  background:#eee;
  padding:30px;
  display:grid;
  grid-template-columns:320px 1fr;
  gap:30px;
  border-radius:12px;
  color: #111;
}

.main-card {
  display: contents;
}

.app-header {
  grid-column: 1 / -1;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  margin-bottom: 5px;
}

.app-header h1 {
  margin: 0;
  font-size: 36px;
  color: #111;
}

.title-actions {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 12px;
}

/* LAYOUT */
.left-panel{
  background:black;
  color:white;
  padding:30px;
  border-radius:12px;
  height:fit-content;
}

.right-panel{
  background:white;
  padding:30px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

/* SONG LIST */
.song-list-title{
  font-size:24px;
  margin-top: 0;
  margin-bottom:20px;
  color: white;
}

.song-header{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-bottom:25px;
}

#songTitleInput{
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
  background: white;
  color: black;
}

.song-header button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  color: white;
  background: #222;
}

#songCollection{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.song-card{
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 12px;
  padding: 15px;
  cursor: pointer;
  transition: 0.2s;
}

.song-card:hover, .song-card.active{
  border-color: #00d084;
  background: rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}

.song-title{
  font-size: 18px;
  margin: 0;
  color: white;
}

/* INPUT AREA & UTILITIES */
input, select, textarea {
  width: 100%;
  padding: 14px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 15px;
}

.input-area{
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 14px;
}

#lyricInput{
  background: white;
  color: black;
}

#chordSelect{
  background: white;
  color: black;
  width: 100px;
}

#positionInput{
  width: 100px;
  background: white;
  color: black;
}

.action-buttons-group {
  grid-column: 1 / -1;
  display: flex;
  gap: 12px;
}

.action-buttons-group button {
  padding: 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  color: white;
  background: #111;
  flex: 1;
}

.action-buttons-group button.danger-btn {
  background: #e63946;
}

.action-buttons-group button.copy-btn {
  background: #00d084;
}

/* MUSIC PLAYER */
.music-player{
  background: #f7f7f7;
  padding: 20px;
  border-radius: 16px;
  border: 1px solid #ddd;
}

.music-player h2{
  font-size: 22px;
  margin-top: 0;
  margin-bottom: 8px;
}

#songName{
  color: #555;
  margin-bottom: 15px;
  font-size: 15px;
}

audio{
  width: 100%;
  margin-bottom: 14px;
}

#musicUpload{
  padding: 10px;
  background: white;
}

/* SONG SHEET / LYRICS VIEW */
#songSheet{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.song-line{
  padding:0;
  margin-bottom:18px;

  background:transparent;
  border:none;
  border-radius:0;

  box-shadow:none;
}

.chord{
  display:block;

  color:#c026d3;

  font-size:28px;
  font-weight:bold;

  margin-bottom:6px;
}

.lyric{
  font-size:34px;

  line-height:1.5;

  color:#111;

  word-break:break-word;
}

.tools{
  display:flex;
  gap:10px;

  margin-top:12px;
}

.tools button{
  border:none;

  padding:10px 16px;

  border-radius:12px;

  font-size:15px;
  font-weight:600;

  cursor:pointer;

  display:flex;
  align-items:center;
  gap:8px;

  transition:0.2s ease;

  box-shadow:
    0 4px 10px rgba(0,0,0,0.08);
}

.app-header, .title-actions {
  position: relative;
  z-index: 100;
}

/* EDIT BUTTON */

.edit-btn{
  background:#2563eb;
  color:white;
}

.edit-btn:hover{
  transform:translateY(-2px);

  background:#1d4ed8;
}

/* DELETE BUTTON */

.delete-btn{
  background:#ef4444;
  color:white;
}

.delete-btn:hover{
  transform:translateY(-2px);

  background:#dc2626;
}

@media (max-width: 900px){

.container{
  width:100% !important;
  margin:0 !important;
  padding:12px !important;

  display:flex !important;
  flex-direction:column !important;

  gap:18px !important;
  border-radius:0 !important;
}

/* MY SONGS PINDAH KE ATAS */
.left-panel{
  order:1 !important;
  width:100%;
  padding:20px;
}

/* EDITOR PINDAH KE BAWAH */
.right-panel{
  order:2 !important;
  width:100%;
  padding:20px;
}

/* HEADER MOBILE FIX */
.app-header{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:12px;
}

.app-header h1{
  font-size:22px;
  line-height:1.3;
}

.title-actions{
  width:100%;
  display:flex;
}

/* INPUT AREA */
.input-area{
  display:grid;

  grid-template-columns:
    1fr 80px 70px;

  gap:10px;
}

/* INPUT LIRIK BESAR */
#lyricInput{
  width:100%;
  min-width:0;

  font-size:18px;
  padding:16px;

  height:58px;
}

/* CHORD */
#chordSelect{
  width:100%;
  font-size:18px;
  height:58px;
}

/* POSISI */
#positionInput{
  width:100%;
  font-size:18px;
  height:58px;
}

/* TOMBOL */
.action-buttons-group{
  grid-column:1 / -1;

  display:grid;
  grid-template-columns:1fr;

  gap:12px;
}

.action-buttons-group button{
  width:100%;
  font-size:18px;
  padding:18px;
}

/* PLAYER */
.music-player{
  padding:18px;
}

.music-player h2{
  font-size:20px;
}

/* CARD LIRIK */
.song-line{
  padding:18px;
}

.chord{
  font-size:28px;
}

.lyric{
  font-size:30px;
  line-height:1.7;

  word-break:break-word;
}

/* TOMBOL EDIT */
.tools{
  flex-wrap:wrap;
}

.tools button{
  flex:1;
  font-size:16px;
  padding:12px;
}

/* MY SONGS TITLE */
.song-list-title{
  font-size:26px;
}

.song-title{
  font-size:20px;
}

}
</style>
</head>

<body>

<div class="container" id="appContainer">
<div class="main-card">
  
  <div class="app-header">
    <h1>🎵 Song Writer Pro</h1>
    <div class="title-actions">
      <!-- TOMBOL LOGOUT TELAH DIHAPUS -->
    </div>
  </div>

  <div class="left-panel">
    <h2 class="song-list-title">✨ MY SONGS</h2>
    <div class="song-header">
      <input type="text" id="songTitleInput" placeholder="Judul Lagu...">
      <button onclick="createNewSong()">➕ Lagu Baru</button>
      <button onclick="deleteCurrentSong()" style="background:#e63946;">🗑 Hapus Lagu</button>
    </div>
    <div id="songCollection"></div>
  </div>

  <div class="right-panel">
    <div class="input-area">
      <input type="text" id="lyricInput" placeholder="Tulis lirik...">
      <select id="chordSelect">
        <option value="F">F</option>
        <option value="Fm">Fm</option>
        <option value="Em">Em</option>
        <option value="Dm">Dm</option>
        <option value="C">C</option>
        <option value="G">G</option>
        <option value="Am">Am</option>
        <option value="A">A</option>
        <option value="E">E</option>
      </select>
      <input type="number" id="positionInput" placeholder="Posisi" value="0">
      
      <div class="action-buttons-group">
        <button onclick="addLine()">Tambahkan Lirik</button>
        <button onclick="resetAllSongs()" class="danger-btn">Reset All Database</button>
        <button class="copy-btn" onclick="copyLyrics()">📋 Salin Lirik</button>
      </div>
    </div>

    <div class="music-player">
      <h2>🎧 Demo Music Player</h2>
      <p id="songName">No music selected</p>
      <audio id="audioPlayer" controls>
      <input type="file" id="musicUpload" accept="audio/*">
    </div>

    <div id="songSheet"></div>
  </div>

</div>
</div>

<script>
  const SUPABASE_URL =
  "https://btajgtzfoyadcnqfgjsg.supabase.co";
  
  const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0YWpndHpmb3lhZGNucWZnanNnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3NTQ3NzEsImV4cCI6MjA5NTMzMDc3MX0.kD81Imzw3NQ_ZTgj5nRPrKfh7Ong7Zmwt7I7WeyeM5M";
  
  const supabaseClient =
  supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );
  
  let currentSongCard = null;
  
  /* LOAD SONGS */
  
  async function loadSongs(){
  
    const collection =
      document.getElementById(
        "songCollection"
      );
  
    collection.innerHTML =
      "<p style='color:#aaa'>Loading...</p>";
  
    const { data, error } =
      await supabaseClient
      .from("songs")
      .select("*")
      .order("created_at", {
        ascending:false
      });
  
    if(error){
  
      console.error(error);
  
      collection.innerHTML =
        "<p style='color:red'>Gagal load lagu</p>";
  
      return;
    }
  
    collection.innerHTML = "";
  
    data.forEach(song => {
  
      const card =
        document.createElement("div");
  
      card.className =
        "song-card";
  
      card.dataset.id =
        song.id;
  
      card.dataset.content =
        song.content || "";
  
      card.dataset.music =
        song.music || "";
  
      card.dataset.musicName =
        song.music_name || "";
  
      card.innerHTML = `
        <h2 class="song-title">
          ${song.title}
        </h2>
      `;
  
      card.addEventListener(
        "click",
        function(){
          selectSong(card);
        }
      );
  
      collection.appendChild(card);
  
    });
  
  }
  
  /* SELECT SONG */
  
  function selectSong(card){
  
    document
    .querySelectorAll(".song-card")
    .forEach(c => {
      c.classList.remove("active");
    });
  
    currentSongCard = card;
  
    card.classList.add("active");
  
    document.getElementById(
      "songSheet"
    ).innerHTML =
      card.dataset.content || "";
  
    const audio =
      document.getElementById(
        "audioPlayer"
      );
  
    const songName =
      document.getElementById(
        "songName"
      );
  
    if(card.dataset.music){
  
      audio.src =
        card.dataset.music;
  
      songName.innerText =
        "Now Playing: " +
        card.dataset.musicName;
  
    }else{
  
      audio.src = "";
  
      songName.innerText =
        "No music selected";
  
    }
  
  }
  
  /* CREATE SONG */
  
  async function createNewSong(){
  
    const input =
      document.getElementById(
        "songTitleInput"
      );
  
    const title =
      input.value.trim();
  
    if(title === ""){
  
      alert("Masukkan judul");
  
      return;
    }
  
    const { error } =
      await supabaseClient
      .from("songs")
      .insert([
        {
          title:title,
          content:"",
          music:"",
          music_name:""
        }
      ]);
  
    if(error){
  
      alert(error.message);
  
      return;
    }
  
    input.value = "";
  
    await loadSongs();
  
  }
  
  /* UPDATE SONG */
  
  async function updateCurrentSong(){

if(!currentSongCard) return;

const id = currentSongCard.dataset.id;

const { data, error } =
  await supabaseClient
  .from("songs")
  .update({
    content: currentSongCard.dataset.content
  })
  .eq("id", id);

if(error){

  console.error("UPDATE ERROR:", error);

  alert(
    "Gagal update lagu:\n" +
    error.message
  );

  return;
}

console.log("Berhasil update");
}
  
  /* ADD LINE */

async function addLine(){

if(!currentSongCard){

  alert("Pilih lagu dulu");

  return;
}

const lyric =
  document.getElementById(
    "lyricInput"
  ).value;

const chord =
  document.getElementById(
    "chordSelect"
  ).value;

const position =
  document.getElementById(
    "positionInput"
  ).value;

if(lyric.trim()===""){

  alert("Isi lirik");

  return;
}

const songSheet =
  document.getElementById(
    "songSheet"
  );

/* BARIS LIRIK */
const line =
  document.createElement("div");

line.className =
  "song-line";

line.innerHTML = `

  <div
    class="chord"
    style="margin-left:${position}px"
  >
    ${chord}
  </div>

  <div class="lyric">
    ${lyric}
  </div>

  <div class="tools">

    <button
      class="edit-btn"
      onclick="editLine(this)"
    >
      ✏ Edit
    </button>

    <button
      class="delete-btn"
      onclick="deleteLine(this)"
    >
      🗑 Hapus
    </button>

  </div>

`;

songSheet.appendChild(line);

currentSongCard.dataset.content =
  songSheet.innerHTML;

document.getElementById(
  "lyricInput"
).value = "";

await updateCurrentSong();

}
  
/* DELETE LINE */

async function deleteLine(btn){

const line =
  btn.closest(".song-line");

line.remove();

currentSongCard.dataset.content =
  document.getElementById(
    "songSheet"
  ).innerHTML;

await updateCurrentSong();

}

/* EDIT LINE */

async function editLine(btn){

const line =
  btn.closest(".song-line");

const chordElement =
  line.querySelector(".chord");

const lyricElement =
  line.querySelector(".lyric");

const currentChord =
  chordElement.innerText;

const currentLyric =
  lyricElement.innerText;

const newChord =
  prompt(
    "Edit chord:",
    currentChord
  );

if(newChord === null)
  return;

const newLyric =
  prompt(
    "Edit lirik:",
    currentLyric
  );

if(newLyric === null)
  return;

chordElement.innerText =
  newChord;

lyricElement.innerText =
  newLyric;

currentSongCard.dataset.content =
  document.getElementById(
    "songSheet"
  ).innerHTML;

await updateCurrentSong();

}
  
  /* COPY LYRICS RAPI */

async function copyLyrics(){

if(!currentSongCard){

  alert("Pilih lagu");

  return;

}

const title =
  currentSongCard
  .querySelector(".song-title")
  .innerText;

const lines =
  document.querySelectorAll(".song-line");

let text = "🎵 " + title + "\n\n";

lines.forEach(line => {

  const chordElement =
    line.querySelector(".chord");

  const lyricElement =
    line.querySelector(".lyric");

  const chord =
    chordElement.innerText;

  const lyric =
    lyricElement.innerText;

  /* AMBIL POSISI CHORD */
  const padding =
    parseInt(
      chordElement.style.marginLeft
    ) || 0;

  /* KONVERSI PIXEL KE SPASI */
  const spaces =
    " ".repeat(
      Math.floor(padding / 8)
    );

  /* FORMAT RAPI */
  text +=
    spaces +
    chord +
    "\n" +
    lyric +
    "\n\n";

});

try{

  await navigator.clipboard
  .writeText(text);

  alert("Lirik berhasil disalin!");

}catch{

  const textarea =
    document.createElement("textarea");

  textarea.value = text;

  document.body.appendChild(textarea);

  textarea.select();

  document.execCommand("copy");

  textarea.remove();

  alert("Lirik berhasil disalin!");

}

}
  
  /* DELETE SONG */
  
  async function deleteCurrentSong(){
  
    if(!currentSongCard){
  
      alert("Pilih lagu");
  
      return;
    }
  
    if(!confirm("Hapus lagu?"))
      return;
  
    const id =
      currentSongCard.dataset.id;
  
    await supabaseClient
    .from("songs")
    .delete()
    .eq("id", id);
  
    currentSongCard = null;
  
    document.getElementById(
      "songSheet"
    ).innerHTML = "";
  
    document.getElementById(
      "audioPlayer"
    ).src = "";
  
    await loadSongs();
  
  }
  
  /* RESET DATABASE */
  
  async function resetAllSongs(){
  
    if(!confirm(
      "Hapus semua lagu?"
    )) return;
  
    const { error } =
      await supabaseClient
      .from("songs")
      .delete()
      .gt("id", 0);
  
    if(error){
  
      alert(error.message);
  
      return;
    }
  
    currentSongCard = null;
  
    document.getElementById(
      "songCollection"
    ).innerHTML = "";
  
    document.getElementById(
      "songSheet"
    ).innerHTML = "";
  
  }
  
  /* MUSIC UPLOAD KE STORAGE */

document
.getElementById("musicUpload")
.addEventListener(
  "change",
  async function(){

    if(!currentSongCard){

      alert("Pilih lagu dulu");

      return;
    }

    const file = this.files[0];

    if(!file) return;

    const audioPlayer =
      document.getElementById(
        "audioPlayer"
      );

    const songName =
      document.getElementById(
        "songName"
      );

    const id =
      currentSongCard.dataset.id;

    /* NAMA FILE UNIK */
    const fileName =
      Date.now() +
      "-" +
      file.name;

    /* UPLOAD FILE */
    const { error: uploadError } =
      await supabaseClient
      .storage
      .from("songs")
      .upload(
        fileName,
        file,
        {
          cacheControl: "3600",
          upsert: false
        }
      );

    if(uploadError){

      console.error(uploadError);

      alert(
        "Upload gagal:\n" +
        uploadError.message
      );

      return;
    }

    /* GET PUBLIC URL */
    const { data: publicData } =
      supabaseClient
      .storage
      .from("songs")
      .getPublicUrl(fileName);

    const publicURL =
      publicData.publicUrl;

    console.log(publicURL);

    /* UPDATE DATABASE */
    const { error:updateError } =
      await supabaseClient
      .from("songs")
      .update({
        music: publicURL,
        music_name: file.name
      })
      .eq("id", id);

    if(updateError){

      console.error(updateError);

      alert(
        "Gagal simpan database"
      );

      return;
    }

    /* UPDATE LOCAL DATASET */
    currentSongCard.dataset.music =
      publicURL;

    currentSongCard.dataset.musicName =
      file.name;

    /* PLAY AUDIO */
    audioPlayer.src = publicURL;

    audioPlayer.load();

    audioPlayer.play();

    songName.innerText =
      "Now Playing: " +
      file.name;

    alert(
      "Musik berhasil diupload!"
    );

  }
);
  
  /* ENTER */
  
  document
  .getElementById("lyricInput")
  .addEventListener(
    "keypress",
    function(e){
  
      if(e.key==="Enter"){
        addLine();
      }
  
    }
  );
  
 /* INIT */
// Langsung memuat data tanpa cek login
loadSongs();
  
  </script>
</body>
</html>
