  // ✅ DIPERBAIKI: Mengambil dan memuat data GENRE dari Supabase
  async function loadSongs(){
    const collection = document.getElementById("songCollection");
    collection.innerHTML = "<p style='color:#aaa; font-size:14px; padding:8px;'>Memuat...</p>";
  
    const { data, error } = await supabaseClient.from("songs").select("*").order("created_at", { ascending:false });
  
    if(error){
      console.error(error);
      collection.innerHTML = "<p style='color:red; font-size:14px; padding:8px;'>Gagal memuat: " + error.message + "</p>";
      return;
    }
  
    collection.innerHTML = "";
    data.forEach(song => {
      const card = document.createElement('div');
      card.className = "song-card";
      card.dataset.id = song.id;
      card.dataset.content = song.content || ""; 
      card.dataset.simpanPosisi = song.simpan_posisi || "";
      card.dataset.genre = song.genre || ""; // ✅ GENRE DIAMBIL DARI DATABASE
      card.dataset.music = song.music || "";
      card.dataset.musicName = song.music_name || "";
      card.innerHTML = `<h2 class="song-title">${song.title}</h2>`;
      card.addEventListener("click", () => selectSong(card));
      collection.appendChild(card);
    });

    pasangEventTombolAksi();
  }

  function pasangEventTombolAksi(){
    const songSheet = document.getElementById('songSheet');
    
    songSheet.removeEventListener('click', tanganiAksiTombol);
    songSheet.addEventListener('click', tanganiAksiTombol);

    songSheet.removeEventListener('click', pilihChord);
    songSheet.addEventListener('click', pilihChord);
  }

  function tanganiAksiTombol(e){
    if(e.target.classList.contains('edit-btn')){
      editLine(e.target);
      return;
    }
    if(e.target.classList.contains('delete-btn')){
      deleteLine(e.target);
      return;
    }
    if(e.target.classList.contains('btn-add-to-line')){
      tambahChordKeBaris(e.target);
      return;
    }
  }
  
  // ✅ DIPERBAIKI: Menampilkan GENRE yang tersimpan saat lagu dipilih
  function selectSong(card){
    document.querySelectorAll(".song-card").forEach(c => c.classList.remove("active"));
    currentSongCard = card;
    card.classList.add("active");

    const judulLagu = card.querySelector('.song-title').innerText;
    const genreLagu = card.dataset.genre; // ✅ Mengambil dari dataset

    const displayJudul = document.getElementById('displaySongTitle');
    const displayGenre = document.getElementById('displaySongGenre');
    const editArea = document.getElementById('genreEditArea');
    const editInput = document.getElementById('editGenreInput');

    displayJudul.innerText = judulLagu;
    displayJudul.style.display = "block";

    // ✅ Tampilkan Genre & Tombol Edit
    if(genreLagu && genreLagu.trim() !== ""){
      displayGenre.innerText = "🎸 Genre: " + genreLagu;
    } else {
      displayGenre.innerText = "🎸 Genre: Belum diatur";
    }
    editArea.style.display = "flex";
    editInput.style.display = "none";
    document.getElementById('btnEditGenre').style.display = "block";
    document.getElementById('btnSaveGenre').style.display = "none";
  
    document.getElementById("songSheet").innerHTML = card.dataset.simpanPosisi || card.dataset.content || "";
    activeChordElement = null;
  
    const audio = document.getElementById("audioPlayer");
    const songName = document.getElementById("songName");
  
    if(card.dataset.music){
      audio.src = card.dataset.music;
      songName.innerText = "Sedang Putar: " + card.dataset.musicName;
    }else{
      audio.src = "";
      songName.innerText = "Belum ada musik";
    }

    pasangEventTombolAksi();
  }

  // ✅ FUNGSI: Tampilkan input untuk edit genre

    const editInput = document.getElementById('editGenreInput');
    const btnEdit = document.getElementById('btnEditGenre');
    const btnSave = document.getElementById('btnSaveGenre');

  // ✅ FUNGSI: Simpan perubahan genre ke database
  async function simpanEditGenre(){
    const editInput = document.getElementById('editGenreInput');
    const nilaiBaru = editInput.value.trim();
    const id = currentSongCard.dataset.id;

    // Simpan ke database
    const { error } = await supabaseClient.from("songs").update({ genre: nilaiBaru }).eq("id", id);
    if(error){ alert("❌ Gagal ubah genre: " + error.message); return; }

  // ✅ DIPERBAIKI: Menyimpan GENRE saat lagu BARU dibuat
  async function createNewSong(){
    const input = document.getElementById("songTitleInput");
    const genreInput = document.getElementById("songGenre");
    const inputValue = input.value.trim();
    const genreValue = genreInput.value.trim();

    if(inputValue === ""){ alert("Masukkan judul lagu"); return; }
  
    const { error } = await supabaseClient.from("songs").insert([{ 
      title: inputValue, 
      genre: genreValue, // ✅ GENRE DISIMPAN KE DATABASE
      content: "", 
      simpan_posisi: "", 
      music: "", 
      music_name: "" 
    }]);
  
    if(error){ alert(error.message); return; }
    input.value = "";
    genreInput.value = "";
    await loadSongs();
  }
  
  // ✅ DIPERBAIKI: Menyimpan PERUBAHAN GENRE saat tombol SIMPAN ditekan

    if(!currentSongCard) return;
    const id = currentSongCard.dataset.id;
    
    const isiPosisi = document.getElementById("songSheet").innerHTML;

  async function addLine(){

    const lyric = document.getElementById("lyricInput").value;
    if(lyric.trim()===""){ alert("Kolom lirik belum diisi"); return; }

    const chordUtama = document.getElementById('mainChord').value;

    document.querySelectorAll('#chordInputsContainer .chord-input-group').forEach(grup => {

      semuaChord.push({ nama: namaChord, posisi: 0 });
    });

    targetElement.className = "song-line";
    songSheet.appendChild(targetElement);

    });
    htmlChord += '</div>';

        <button class="delete-btn"><i class="fa-solid fa-trash"></i></button>

    `;

    document.getElementById("lyricInput").value = "";
    document.getElementById("chordInputsContainer").innerHTML = "";
    activeChordElement = null;

    await updateCurrentSong();
    pasangEventTombolAksi();
  }
  
async function deleteLine(btn){

  line.remove();
  await updateCurrentSong();
}

async function editLine(btn){
  const line = btn.closest(".song-line");
  const lyricElement = line.querySelector(".lyric");
  const currentLyric = lyricElement.innerText;
  const newLyric = prompt("Edit lirik:", currentLyric);
  if(newLyric === null) return;
  lyricElement.innerText = newLyric;
  await updateCurrentSong();
}
  
async function copyLyrics() {

if (!currentSongCard) {
    alert("Pilih lagu dulu");
    return;
}

const title =
    currentSongCard.querySelector(".song-title").innerText;

const genre =
    currentSongCard.dataset.genre || "";

let hasil = "";

hasil += "🎵 " + title + "\n";

if (genre) {
    hasil += "🎸 Genre: " + genre + "\n";
}

hasil += "--------------------------------\n\n";

document.querySelectorAll("#songSheet .song-line")
.forEach(line => {

    const lyric =
        line.querySelector(".lyric")?.innerText || "";

    const chords =
        [...line.querySelectorAll(".chord")]
        .sort((a,b)=>
            (parseInt(a.style.left)||0)
            -
            (parseInt(b.style.left)||0)
        );

    let chordLine = "";

    chords.forEach(chord => {

        const left =
            parseInt(chord.style.left) || 0;

        // 1 karakter ≈ 10px
        const targetPos =
            Math.round(left / 10);

        while (chordLine.length < targetPos) {
            chordLine += " ";
        }

        chordLine += chord.innerText;
    });

    hasil += chordLine + "\n";
    hasil += lyric + "\n\n";

});

try {
    await navigator.clipboard.writeText(hasil);
    alert("✅ Lirik berhasil disalin!");
}
catch {

    const textarea =
        document.createElement("textarea");

    textarea.value = hasil;

    document.body.appendChild(textarea);

    textarea.select();

    document.execCommand("copy");

    textarea.remove();

    alert("✅ Lirik berhasil disalin!");
}
}
  
  async function deleteCurrentSong(){
    if(!currentSongCard){ alert("Pilih lagu dulu"); return; }
    if(!confirm("Hapus lagu ini?")) return;
    const id = currentSongCard.dataset.id;
    await supabaseClient.from("songs").delete().eq("id", id);
    currentSongCard = null;
    document.getElementById("songSheet").innerHTML = "";
    document.getElementById("audioPlayer").src = "";
    document.getElementById('displaySongTitle').style.display = "none";
    document.getElementById('genreEditArea').style.display = "none";
    await loadSongs();
  }
  
  async function resetAllSongs(){
    if(!confirm("HapUS SEMUA lagu? Tindakan ini tidak bisa dibatalkan!")) return;
    const { error } = await supabaseClient.from("songs").delete().gt("id", 0);
    if(error){ alert(error.message); return; }
    currentSongCard = null;
    document.getElementById("songCollection").innerHTML = "";
    document.getElementById("songSheet").innerHTML = "";
    document.getElementById('displaySongTitle').style.display = "none";
    document.getElementById('genreEditArea').style.display = "none";
  }
  
  document.getElementById("musicUpload")
.addEventListener("change", async function(){

  if(!currentSongCard){
    alert("Pilih lagu dulu");
    return;
  }

  const file = this.files[0];

  if(!file) return;

  const id =
    currentSongCard.dataset.id;

  const audioPlayer =
    document.getElementById("audioPlayer");

  const songName =
    document.getElementById("songName");

  const fileName =
    Date.now() + "-" + file.name;

  const { error: uploadError } =
    await supabaseClient
    .storage
    .from("songs")
    .upload(
      fileName,
      file,
      {
        cacheControl: "3600",
        upsert: false
      }
    );

  if(uploadError){
    alert(
      "Upload gagal:\n" +
      uploadError.message
    );
    return;
  }

  const { data } =
    supabaseClient
    .storage
    .from("songs")
    .getPublicUrl(fileName);

  const publicURL =
    data.publicUrl;

  const { error } =
    await supabaseClient
    .from("songs")
    .update({
      music: publicURL,
      music_name: file.name
    })
    .eq("id", id);

  if(error){
    alert(
      "Gagal simpan musik:\n" +
      error.message
    );
    return;
  }

  currentSongCard.dataset.music =
    publicURL;

  currentSongCard.dataset.musicName =
    file.name;

  audioPlayer.src =
    publicURL;

  audioPlayer.load();

  songName.innerText =
    "Sedang Putar: " +
    file.name;

  alert(
    "✅ Musik berhasil diupload"
  );

});

    document.querySelectorAll("#songSheet .song-line");

let hasil = "";

semuaBaris.forEach(baris=>{

    const lyricEl =
        baris.querySelector(".lyric");

    const chordEls =
        baris.querySelectorAll(".chord");

    hasil += `
        <div class="view-line">
            <div class="view-chord-container">
    `;

    chordEls.forEach(chord=>{

        const posisi =
            chord.style.left || "0px";

        hasil += `
            <div class="view-chord"
                 style="left:${posisi}">
                ${chord.innerText}
            </div>
        `;
    });

    hasil += `
            </div>

            <div class="view-lyric">
                ${lyricEl ? lyricEl.innerText : ""}
            </div>

        </div>
    `;
});

document.getElementById("lyricViewContent").innerHTML =
    hasil;

document.getElementById("mainPage").style.display =
    "none";

document.getElementById("lyricViewPage").style.display =
    "block";
}

function kembaliKeHalamanUtama(){

document.getElementById("lyricViewPage").style.display =
    "none";

document.getElementById("mainPage").style.display =
    "grid";

document.body.style.background =
    "#111";
}

  // Panggil fungsi awal saat halaman dimuat
  window.onload = function(){
    loadSongs();
  };
</script>
</body>
</html>
