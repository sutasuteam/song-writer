<!-- ✅ HALAMAN UTAMA -->

<div class="main-card">
  
  <div class="app-header">

  <div class="left-panel">

  <div class="right-panel">
    <div class="input-area">

      <div class="chord-main-bar">
        <div class="chord-base-group">
          <select class="chordSelect" id="mainChord">
            <option value="F">F</option>
            <option value="Fm">Fm</option>
            <option value="Em">Em</option>
            <option value="Dm">Dm</option>
            <option value="C">C</option>
            <option value="G">G</option>
            <option value="Am">Am</option>
            <option value="A">A</option>
            <option value="E">E</option>
            <option value="G7">G7</option>
            <option value="C7">C7</option>
            <option value="D7">D7</option>
          </select>
        </div>

        <button type="button" class="btn-gestur" onclick="geserKiri()">
          <i class="fa-solid fa-chevron-left"></i>
        </button>
        
        <button type="button" class="btn-gestur" onclick="geserKanan()">
          <i class="fa-solid fa-chevron-right"></i>
        </button>

        <!-- ✅ TOMBOL LIHAT LIRIK DITARUH DI SINI -->
        <button type="button" class="btn-view-lyric" onclick="bukaHalamanLirik()">
          <i class="fa-solid fa-file-lines"></i> Lihat Lirik
        </button>

      </div>

      <div id="chordInputsContainer"></div>
      
      <div class="action-buttons-group">
        <button class="main-btn" onclick="addLine()">✅ Tambah Lirik</button>
        <button class="save-btn" onclick="updateCurrentSong()">💾 Simpan Posisi</button>
        <button class="danger-btn" onclick="resetAllSongs()">Reset Data</button>
        <button class="copy-btn" onclick="copyLyrics()">📋 Salin Lirik</button>
      </div>
    </div>

    <div class="music-player">
      <h2>🎧 Musik</h2>
      <p id="songName">Belum ada musik</p>
      <audio id="audioPlayer" controls>
      <input type="file" id="musicUpload" accept="audio/*">
    </div>

    <div id="displaySongTitle"></div>

    <!-- ✅ BAGIAN EDIT & SIMPAN GENRE -->
    <div class="genre-edit-area" id="genreEditArea">
      <span id="displaySongGenre"></span>
      <input type="text" id="editGenreInput" placeholder="Ubah genre...">
      <button class="btn-edit-genre" id="btnEditGenre" onclick="tampilkanEditGenre()">✏️ Ubah</button>
      <button class="btn-save-genre" id="btnSaveGenre" onclick="simpanEditGenre()">💾 Simpan</button>
    </div>

    <div id="songSheet"></div>
  </div>

</div>
</div>

<!-- ✅ HALAMAN LIHAT LIRIK (TERPISAH) -->

  let currentSongCard = null;
  let activeChordElement = null;

  function geserKiri() {
    if(!activeChordElement) { alert("👉 Klik dulu chord yang mau diatur posisinya!"); return; }
    let posisiSekarang = parseInt(activeChordElement.style.left) || 0;
    activeChordElement.style.left = (posisiSekarang - 10) + "px";
  }

  function geserKanan() {
    if(!activeChordElement) { alert("👉 Klik dulu chord yang mau diatur posisinya!"); return; }
    let posisiSekarang = parseInt(activeChordElement.style.left) || 0;
    activeChordElement.style.left = (posisiSekarang + 10) + "px";
  }

  function pilihChord(e){
    if(e.target.classList.contains('chord')){
      document.querySelectorAll('.chord').forEach(c => c.classList.remove('active-chord'));
      activeChordElement = e.target;
      activeChordElement.classList.add('active-chord');
    }
  }

  function tambahChordKeBaris(btn) {
    const line = btn.closest('.song-line');
    const chordContainer = line.querySelector('.chord-container');
    
    const pilih = document.createElement('select');
    pilih.className = 'chord-select-popup';

      <option value="F">F</option>

      <option value="Em">Em</option>

      <option value="C">C</option>

      <option value="Am">Am</option>
      <option value="A">A</option>
      <option value="E">E</option>
      <option value="G7">G7</option>
      <option value="C7">C7</option>
      <option value="D7">D7</option>
      <option value="Bm">Bm</option>
      <option value="B">B</option>
      <option value="A7">A7</option>

    tombolOK.innerText = "✅ Tambah";
    tombolOK.style.cssText = `
      margin-left:8px;
      padding:6px 12px;
      background:#22c55e;

      border:none;

    tombolBatal.innerText = "❌ Batal";

      background:#ef4444;
      color:white;
      border:none;
      border-radius:4px;
      cursor:pointer;
    `;

    const tombolGroup = document.createElement('div');
    tombolGroup.style.marginTop = "10px";
    tombolGroup.appendChild(tombolOK);
    tombolGroup.appendChild(tombolBatal);

  // ✅ DIPERBAIKI: Mengambil dan memuat data GENRE dari Supabase
  async function loadSongs(){
    const collection = document.getElementById("songCollection");
    collection.innerHTML = "<p style='color:#aaa; font-size:14px; padding:8px;'>Memuat...</p>";
  
    const { data, error } = await supabaseClient.from("songs").select("*").order("created_at", { ascending:false });
  
    if(error){
      console.error(error);
      collection.innerHTML = "<p style='color:red; font-size:14px; padding:8px;'>Gagal memuat: " + error.message + "</p>";
      return;
    }
  
    collection.innerHTML = "";
    data.forEach(song => {
      const card = document.createElement('div');
      card.className = "song-card";
      card.dataset.id = song.id;
      card.dataset.content = song.content || ""; 
      card.dataset.simpanPosisi = song.simpan_posisi || "";
      card.dataset.genre = song.genre || ""; // ✅ GENRE DIAMBIL DARI DATABASE
      card.dataset.music = song.music || "";
      card.dataset.musicName = song.music_name || "";
      card.innerHTML = `<h2 class="song-title">${song.title}</h2>`;
      card.addEventListener("click", () => selectSong(card));
      collection.appendChild(card);
    });

    pasangEventTombolAksi();
  }

  function pasangEventTombolAksi(){
    const songSheet = document.getElementById('songSheet');
    
    songSheet.removeEventListener('click', tanganiAksiTombol);
    songSheet.addEventListener('click', tanganiAksiTombol);

    songSheet.removeEventListener('click', pilihChord);
    songSheet.addEventListener('click', pilihChord);
  }

  function tanganiAksiTombol(e){
    if(e.target.classList.contains('edit-btn')){
      editLine(e.target);
      return;
    }
    if(e.target.classList.contains('delete-btn')){
      deleteLine(e.target);
      return;
    }
    if(e.target.classList.contains('btn-add-to-line')){
      tambahChordKeBaris(e.target);
      return;
    }
  }
  
  // ✅ DIPERBAIKI: Menampilkan GENRE yang tersimpan saat lagu dipilih
  function selectSong(card){
    document.querySelectorAll(".song-card").forEach(c => c.classList.remove("active"));
    currentSongCard = card;
    card.classList.add("active");

    const judulLagu = card.querySelector('.song-title').innerText;
    const genreLagu = card.dataset.genre; // ✅ Mengambil dari dataset

    const displayJudul = document.getElementById('displaySongTitle');
    const displayGenre = document.getElementById('displaySongGenre');
    const editArea = document.getElementById('genreEditArea');
    const editInput = document.getElementById('editGenreInput');

    displayJudul.innerText = judulLagu;
    displayJudul.style.display = "block";

    // ✅ Tampilkan Genre & Tombol Edit
    if(genreLagu && genreLagu.trim() !== ""){
      displayGenre.innerText = "🎸 Genre: " + genreLagu;
    } else {
      displayGenre.innerText = "🎸 Genre: Belum diatur";
    }
    editArea.style.display = "flex";
    editInput.style.display = "none";
    document.getElementById('btnEditGenre').style.display = "block";
    document.getElementById('btnSaveGenre').style.display = "none";
  
    document.getElementById("songSheet").innerHTML = card.dataset.simpanPosisi || card.dataset.content || "";
    activeChordElement = null;
  
    const audio = document.getElementById("audioPlayer");
    const songName = document.getElementById("songName");
  
    if(card.dataset.music){
      audio.src = card.dataset.music;
      songName.innerText = "Sedang Putar: " + card.dataset.musicName;
    }else{
      audio.src = "";
      songName.innerText = "Belum ada musik";
    }

    pasangEventTombolAksi();
  }

  // ✅ FUNGSI: Tampilkan input untuk edit genre
  function tampilkanEditGenre(){
    const displayGenre = document.getElementById('displaySongGenre');
    const editInput = document.getElementById('editGenreInput');
    const btnEdit = document.getElementById('btnEditGenre');
    const btnSave = document.getElementById('btnSaveGenre');
    
    let nilaiSekarang = currentSongCard.dataset.genre || "";
    nilaiSekarang = nilaiSekarang.replace("🎸 Genre: ", "").replace("Belum diatur", "").trim();
    
    displayGenre.style.display = "none";
    editInput.value = nilaiSekarang;
    editInput.style.display = "block";
    btnEdit.style.display = "none";
    btnSave.style.display = "block";
  }

  // ✅ FUNGSI: Simpan perubahan genre ke database
  async function simpanEditGenre(){
    const editInput = document.getElementById('editGenreInput');
    const nilaiBaru = editInput.value.trim();
    const id = currentSongCard.dataset.id;

    // Simpan ke database
    const { error } = await supabaseClient.from("songs").update({ genre: nilaiBaru }).eq("id", id);
    if(error){ alert("❌ Gagal ubah genre: " + error.message); return; }

    // Update tampilan & data lokal
    currentSongCard.dataset.genre = nilaiBaru;
    const displayGenre = document.getElementById('displaySongGenre');
    
    if(nilaiBaru !== ""){
      displayGenre.innerText = "🎸 Genre: " + nilaiBaru;
    } else {
      displayGenre.innerText = "🎸 Genre: Belum diatur";
    }

    // Kembali ke tampilan awal
    editInput.style.display = "none";
    document.getElementById('btnEditGenre').style.display = "block";
    document.getElementById('btnSaveGenre').style.display = "none";
    displayGenre.style.display = "block";
    
    alert("✅ Genre berhasil diubah!");
  }
  
  // ✅ DIPERBAIKI: Menyimpan GENRE saat lagu BARU dibuat
  async function createNewSong(){
    const input = document.getElementById("songTitleInput");
    const genreInput = document.getElementById("songGenre");
    const inputValue = input.value.trim();
    const genreValue = genreInput.value.trim();

    if(inputValue === ""){ alert("Masukkan judul lagu"); return; }
  
    const { error } = await supabaseClient.from("songs").insert([{ 
      title: inputValue, 
      genre: genreValue, // ✅ GENRE DISIMPAN KE DATABASE
      content: "", 
      simpan_posisi: "", 
      music: "", 
      music_name: "" 
    }]);
  
    if(error){ alert(error.message); return; }
    input.value = "";
    genreInput.value = "";
    await loadSongs();
  }
  
  // ✅ DIPERBAIKI: Menyimpan PERUBAHAN GENRE saat tombol SIMPAN ditekan
  async function updateCurrentSong(){
    if(!currentSongCard) return;
    const id = currentSongCard.dataset.id;
    
    const isiPosisi = document.getElementById("songSheet").innerHTML;
    currentSongCard.dataset.simpanPosisi = isiPosisi;

    // ✅ UPDATE KE DATABASE SUPABASE
    const { error } = await supabaseClient.from("songs").update({ 
      simpan_posisi: isiPosisi
    }).eq("id", id);
  
    if(error){ alert("❌ Gagal simpan:\n" + error.message); }
  }
  
  async function addLine(){
    if(!currentSongCard){ alert("Pilih lagu dulu di daftar MY SONGS"); return; }
  
    const lyric = document.getElementById("lyricInput").value;
    if(lyric.trim()===""){ alert("Kolom lirik belum diisi"); return; }

    const semuaChord = [];
    const chordUtama = document.getElementById('mainChord').value;
    semuaChord.push({ nama: chordUtama, posisi: 0 });

    document.querySelectorAll('#chordInputsContainer .chord-input-group').forEach(grup => {
      const namaChord = grup.querySelector('.chordSelect').value;
      semuaChord.push({ nama: namaChord, posisi: 0 });
    });

    const songSheet = document.getElementById("songSheet");
    const targetElement = document.createElement("div");
    targetElement.className = "song-line";
    songSheet.appendChild(targetElement);

    let htmlChord = '<div class="chord-container">';
    semuaChord.forEach(c => {
      htmlChord += `<div class="chord" style="left:${c.posisi}px">${c.nama}</div>`;
    });
    htmlChord += '</div>';

    targetElement.innerHTML = `
      ${htmlChord}
      <div class="lyric">${lyric}</div>
      <div class="tools">
        <button class="edit-btn"><i class="fa-solid fa-pen-to-square"></i></button>
        <button class="delete-btn"><i class="fa-solid fa-trash"></i></button>
        <button class="btn-add-to-line"><i class="fa-solid fa-plus"></i></button>
      </div>
    `;

    document.getElementById("lyricInput").value = "";
    document.getElementById("chordInputsContainer").innerHTML = "";
    activeChordElement = null;

    await updateCurrentSong();
    pasangEventTombolAksi();
  }
  
async function deleteLine(btn){
  const line = btn.closest(".song-line");
  line.remove();
  await updateCurrentSong();
}

async function editLine(btn){
  const line = btn.closest(".song-line");
  const lyricElement = line.querySelector(".lyric");
  const currentLyric = lyricElement.innerText;
  const newLyric = prompt("Edit lirik:", currentLyric);
  if(newLyric === null) return;
  lyricElement.innerText = newLyric;
  await updateCurrentSong();
}
  
  async function copyLyrics(){
    if(!currentSongCard){ alert("Pilih lagu dulu"); return; }
    const title = currentSongCard.querySelector(".song-title").innerText;
    const genre = currentSongCard.dataset.genre;
    const lines = document.querySelectorAll(".song-line");
    let text = "🎵 " + title + "\n";
    if(genre) text += "🎸 Genre: " + genre + "\n";
    text += "------------------------\n\n";

    lines.forEach(line => {
      const chordElements = line.querySelectorAll(".chord");
      const lyricElement = line.querySelector(".lyric");

      let barisChord = "";
      chordElements.forEach(chordEl => {
        const pos = parseInt(chordEl.style.left) || 0;
        const spasi = " ".repeat(Math.max(0, Math.floor(pos / 8) - barisChord.length));
        barisChord += spasi + chordEl.textContent;
      });

      const barisLirik = lyricElement ? lyricElement.innerText : "";
      text += barisChord + "\n" + barisLirik + "\n\n";
    });

    try{
      await navigator.clipboard.writeText(text);
      alert("✅ Lirik disalin!");
    }catch{
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
      alert("✅ Lirik disalin!");
    }
  }
  
  async function deleteCurrentSong(){
    if(!currentSongCard){ alert("Pilih lagu dulu"); return; }
    if(!confirm("Hapus lagu ini?")) return;
    const id = currentSongCard.dataset.id;
    await supabaseClient.from("songs").delete().eq("id", id);
    currentSongCard = null;
    document.getElementById("songSheet").innerHTML = "";
    document.getElementById("audioPlayer").src = "";
    document.getElementById('displaySongTitle').style.display = "none";
    document.getElementById('genreEditArea').style.display = "none";
    await loadSongs();
  }
  
  async function resetAllSongs(){
    if(!confirm("HapUS SEMUA lagu? Tindakan ini tidak bisa dibatalkan!")) return;
    const { error } = await supabaseClient.from("songs").delete().gt("id", 0);
    if(error){ alert(error.message); return; }
    currentSongCard = null;
    document.getElementById("songCollection").innerHTML = "";
    document.getElementById("songSheet").innerHTML = "";
    document.getElementById('displaySongTitle').style.display = "none";
    document.getElementById('genreEditArea').style.display = "none";
  }
  
document.getElementById("musicUpload").addEventListener("change", async function(){
    if(!currentSongCard){ alert("Pilih lagu dulu"); return; }
    const file = this.files[0];
    if(!file) return;
    const audioPlayer = document.getElementById("audioPlayer");
    const songName = document.getElementById("songName");

    const reader = new FileReader();
    reader.onload = async function(e){
      const url = e.target.result;
      audioPlayer.src = url;
      songName.innerText = "Sedang Putar: " + file.name;
      
      // Simpan data musik ke database
      const id = currentSongCard.dataset.id;
      const { error } = await supabaseClient.from("songs").update({
        music: url,
        music_name: file.name
      }).eq("id", id);
      
      if(error) alert("❌ Gagal simpan musik: " + error.message);
      else {
        // Update data di elemen
        currentSongCard.dataset.music = url;
        currentSongCard.dataset.musicName = file.name;
      }
    };
    reader.readAsDataURL(file);
  });

  // ✅ FUNGSI HALAMAN LIHAT LIRIK
  function bukaHalamanLirik(){
    if(!currentSongCard){ alert("Pilih lagu dulu!"); return; }

    const judul = document.getElementById('displaySongTitle').innerText;
    const genre = document.getElementById('displaySongGenre').innerText;
    const isiLirik = document.getElementById('songSheet').innerHTML;

    // Masukkan data ke halaman baru
    document.getElementById('lyricViewTitle').innerText = judul;
    document.getElementById('lyricViewGenre').innerText = genre;

    // Ubah tampilan lirik ke versi bersih
    const parser = new DOMParser();
    const doc = parser.parseFromString(isiLirik, 'text/html');
    const barisAsli = doc.querySelectorAll('.song-line');
    let tampilanBersih = "";

    barisAsli.forEach(baris => {
      const chordContainer = baris.querySelector('.chord-container');
      const lirik = baris.querySelector('.lyric').innerText;
      
      tampilanBersih += `<div class="view-line">`;
      tampilanBersih += `<div class="view-chord-container">`;
      
      const semuaChord = chordContainer.querySelectorAll('.chord');
      semuaChord.forEach(c => {
        const posisi = c.style.left || "0px";
        tampilanBersih += `<div class="view-chord" style="left: ${posisi}">${c.innerText}</div>`;
      });
      
      tampilanBersih += `</div>`;
      tampilanBersih += `<div class="view-lyric">${lirik}</div>`;
      tampilanBersih += `</div>`;
    });

    document.getElementById('lyricViewContent').innerHTML = tampilanBersih;

    // Tampilkan halaman lirik, sembunyikan halaman utama
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('lyricViewPage').style.display = 'block';
    document.body.style.background = "#ffffff";
  }

  function kembaliKeHalamanUtama(){
    // Tampilkan halaman utama, sembunyikan halaman lirik
    document.getElementById('lyricViewPage').style.display = 'none';
    document.getElementById('mainPage').style.display = 'grid';
    document.body.style.background = "#111111";
  }

  // Panggil fungsi awal saat halaman dimuat
  window.onload = function(){
    loadSongs();
  };
</script>
